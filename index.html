<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Madrasah Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FFFBEB; }
        .islamic-pattern { background-image: radial-gradient(#0F766E 0.5px, transparent 0.5px); background-size: 20px 20px; opacity: 0.05; }
        .btn-primary { @apply bg-[#0F766E] text-white px-4 py-2 rounded-lg hover:bg-[#0D635C] transition-all; }
        .card { @apply bg-white p-6 rounded-2xl shadow-sm border border-amber-100; }
        .tab-active { @apply border-b-4 border-[#D97706] text-[#0F766E] font-bold; }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; border-radius: 12px; color: white; z-index: 1000; transform: translateY(100px); transition: all 0.3s; }
        .toast.show { transform: translateY(0); }
    </style>
</head>
<body class="min-h-screen">
    <div class="islamic-pattern absolute inset-0 pointer-events-none"></div>

    <header class="bg-[#0F766E] text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-xs opacity-80 italic">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</p>
                <h1 id="madrasah-name" class="text-xl font-bold uppercase tracking-wide">Absensi Madrasah</h1>
            </div>
            <div id="status-badge" class="flex items-center gap-2 bg-white/10 px-3 py-1 rounded-full text-xs">
                <span id="sync-icon" class="w-2 h-2 rounded-full bg-green-400"></span>
                <span id="sync-text">Tersinkron</span>
            </div>
        </div>
    </header>

    <main id="auth-view" class="max-w-md mx-auto mt-20 px-4">
        <div class="card">
            <h2 class="text-2xl font-bold text-center text-[#0F766E] mb-6">Masuk Petugas</h2>
            <div class="space-y-4">
                <input type="text" id="login-ssId" placeholder="Google Sheet ID" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-amber-500">
                <input type="text" id="username" placeholder="Username" class="w-full p-3 border rounded-xl outline-none">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded-xl outline-none">
                <button onclick="handleLogin()" class="w-full py-4 bg-[#D97706] text-white rounded-xl font-bold hover:scale-[1.02] transition-transform">Masuk</button>
                <p class="text-center text-xs text-gray-400 mt-4">Hint: admin / admin123</p>
            </div>
        </div>
    </main>

    <main id="app-view" class="hidden max-w-5xl mx-auto p-4 pb-24">
        <!-- Navigation Tabs -->
        <nav class="flex border-b border-gray-200 mb-6 bg-white rounded-t-xl overflow-hidden">
            <button onclick="switchTab('input')" id="tab-input" class="flex-1 py-4 text-center tab-active">Input</button>
            <button onclick="switchTab('rekap')" id="tab-rekap" class="flex-1 py-4 text-center">Rekap & AI</button>
            <button onclick="switchTab('config')" id="tab-config" class="flex-1 py-4 text-center">Pengaturan</button>
        </nav>

        <!-- Tab: Input Absensi -->
        <section id="view-input" class="space-y-6">
            <div class="card grid md:grid-cols-3 gap-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Tanggal</label>
                    <input type="date" id="input-date" class="w-full p-2 border rounded-lg">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Sesi</label>
                    <select id="input-session" class="w-full p-2 border rounded-lg">
                        <option value="1">Jam 1 (Pagi)</option>
                        <option value="2">Jam 2 (Siang)</option>
                        <option value="3">Jam 3 (Malam)</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="lockSessionToday()" class="w-full bg-red-500 text-white p-2 rounded-lg text-sm font-semibold">🔒 Kunci Sesi Ini</button>
                </div>
            </div>

            <div class="card bg-[#0F766E]/5">
                <div class="flex gap-2">
                    <input type="text" id="scanner-input" placeholder="Scan QR atau Ketik NIS (Enter)" 
                           class="flex-1 p-4 border-2 border-[#0F766E] rounded-xl focus:ring-0 text-xl font-mono text-center">
                    <select id="input-status" class="bg-white px-4 border rounded-xl font-bold">
                        <option value="Hadir">HADIR</option>
                        <option value="Sakit">SAKIT</option>
                        <option value="Izin">IZIN</option>
                        <option value="Alpha">ALPHA</option>
                    </select>
                </div>
                <p class="text-center text-xs text-gray-500 mt-2">Mode: Enter Otomatis Aktif</p>
            </div>

            <div class="card overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-xs text-gray-400 border-b">
                            <th class="pb-2">WAKTU</th>
                            <th class="pb-2">SISWA</th>
                            <th class="pb-2 text-center">STATUS</th>
                            <th class="pb-2 text-right">SYNC</th>
                        </tr>
                    </thead>
                    <tbody id="recent-list" class="divide-y text-sm">
                        <!-- List dinamis -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Tab: Rekap & AI -->
        <section id="view-rekap" class="hidden space-y-6">
            <div class="grid md:grid-cols-2 gap-4">
                <div class="card bg-amber-50">
                    <h3 class="font-bold text-amber-800 mb-2">Peringatan Alpha Tinggi</h3>
                    <div id="warning-list" class="space-y-2 text-sm">
                        <!-- Logika JS -->
                    </div>
                </div>
                <div class="card flex flex-col items-center justify-center text-center">
                    <button onclick="generateAI()" class="bg-[#0F766E] text-white p-4 rounded-full shadow-lg mb-4 hover:rotate-12 transition-all">🤖</button>
                    <h3 class="font-bold">Analisis AI Pesantren</h3>
                    <p class="text-xs text-gray-500">Klik untuk mendapatkan ringkasan perilaku santri</p>
                </div>
            </div>
            <div id="ai-result" class="card hidden prose prose-sm max-w-none bg-white">
                <!-- Hasil AI -->
            </div>
        </section>

        <!-- Tab: Pengaturan -->
        <section id="view-config" class="hidden space-y-4">
            <div class="card">
                <h3 class="font-bold mb-4">Database & Setup</h3>
                <button onclick="runSetup()" class="w-full p-3 border-2 border-[#0F766E] text-[#0F766E] rounded-xl font-bold hover:bg-[#0F766E] hover:text-white transition-all">⚙️ Jalankan Initial Setup Sheets</button>
            </div>
            <div class="card space-y-4">
                <div>
                    <label class="text-xs font-bold">API Key Gemini (AI)</label>
                    <input type="password" id="cfg-ai-key" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="text-xs font-bold">Batas Alpha (Reguler)</label>
                    <input type="number" id="cfg-threshold" class="w-full p-2 border rounded">
                </div>
                <button onclick="saveSettings()" class="btn-primary w-full">Simpan Perubahan</button>
            </div>
        </section>
    </main>

    <div id="toast" class="toast"></div>

    <script>
        const state = {
            user: null,
            ssId: localStorage.getItem('ssId') || '',
            gasUrl: 'https://script.google.com/macros/s/AKfycbwOIowzp-NfJr3g5w7HOsdJ7OPfkNZzCd--PQZ_iuBPyId2ZAMuPZMQ32ohqK9V5sVYqA/exec', // GANTI DENGAN URL DEPLOY GAS ANDA
            queue: JSON.parse(localStorage.getItem('absensi_pending') || '[]'),
            settings: {},
            students: []
        };

        // --- CORE FUNCTIONS ---

        window.onload = () => {
            if (state.ssId) document.getElementById('login-ssId').value = state.ssId;
            document.getElementById('input-date').valueAsDate = new Date();
            
            // Listeners
            document.getElementById('scanner-input').addEventListener('keypress', e => {
                if (e.key === 'Enter') processAttendance();
            });

            window.addEventListener('online', syncOfflineData);
            updateSyncBadge();
            renderRecentList();
        };

        async function api(action, data = {}) {
            const body = JSON.stringify({ action, data: { ...data, ssId: state.ssId } });
            try {
                const res = await fetch(state.gasUrl, {
                    method: 'POST',
                    mode: 'no-cors', // Penting untuk GAS
                    headers: { 'Content-Type': 'text/plain' },
                    body: body
                });
                // Karena mode 'no-cors', kita tidak bisa baca response body secara langsung.
                // Untuk production sesungguhnya, gunakan Proxy atau Deploy "Anyone" dengan benar.
                return { success: true }; 
            } catch (err) {
                return { success: false, message: err.toString() };
            }
        }

        function processAttendance() {
            const nis = document.getElementById('scanner-input').value;
            const tanggal = document.getElementById('input-date').value;
            const sesi = document.getElementById('input-session').value;
            const status = document.getElementById('input-status').value;

            if (!nis) return;

            const entry = {
                id: Date.now(),
                nis,
                tanggal,
                sesi,
                status,
                metode: 'Scan',
                petugas: state.user?.username || 'Guest',
                timestamp: new Date().toISOString(),
                syncStatus: 'pending'
            };

            // Simpan ke local
            state.queue.unshift(entry);
            localStorage.setItem('absensi_pending', JSON.stringify(state.queue));
            
            // Clear input
            document.getElementById('scanner-input').value = '';
            document.getElementById('scanner-input').focus();
            
            renderRecentList();
            showToast('✅ Berhasil dicatat (Offline)', '#0F766E');

            // Coba kirim jika online
            if (navigator.onLine) {
                sendToGas(entry);
            } else {
                updateSyncBadge();
            }
        }

        async function sendToGas(entry) {
            const res = await fetch(state.gasUrl, {
                method: 'POST',
                body: JSON.stringify({ action: 'submit_attendance', data: { ...entry, ssId: state.ssId } })
            });
            const result = await res.json();
            
            if (result.success) {
                markAsSynced(entry.id);
            } else {
                showToast('❌ ' + result.message, '#ef4444');
            }
        }

        function markAsSynced(id) {
            state.queue = state.queue.map(item => item.id === id ? { ...item, syncStatus: 'synced' } : item);
            localStorage.setItem('absensi_pending', JSON.stringify(state.queue));
            renderRecentList();
            updateSyncBadge();
        }

        async function syncOfflineData() {
            const pending = state.queue.filter(i => i.syncStatus === 'pending');
            if (pending.length === 0) return;

            showToast(`🔄 Sinkronisasi ${pending.length} data...`, '#D97706');
            
            const res = await fetch(state.gasUrl, {
                method: 'POST',
                body: JSON.stringify({ action: 'sync_pending', data: { ssId: state.ssId, queue: pending } })
            });
            const result = await res.json();

            if (result.success) {
                state.queue = state.queue.map(i => ({ ...i, syncStatus: 'synced' }));
                localStorage.setItem('absensi_pending', JSON.stringify(state.queue));
                renderRecentList();
                updateSyncBadge();
                showToast(`✅ ${result.count} Data berhasil sinkron`, '#0F766E');
            }
        }

        // --- UI HELPERS ---

        function renderRecentList() {
            const container = document.getElementById('recent-list');
            container.innerHTML = state.queue.slice(0, 10).map(item => `
                <tr class="hover:bg-gray-50">
                    <td class="py-3 text-xs text-gray-400">${new Date(item.timestamp).toLocaleTimeString()}</td>
                    <td class="py-3 font-semibold">${item.nis}</td>
                    <td class="py-3 text-center">
                        <span class="px-2 py-1 rounded-full text-[10px] ${getStatusColor(item.status)}">${item.status}</span>
                    </td>
                    <td class="py-3 text-right">
                        ${item.syncStatus === 'synced' ? '✅' : '⏳'}
                    </td>
                </tr>
            `).join('');
        }

        function getStatusColor(s) {
            if (s === 'Hadir') return 'bg-green-100 text-green-700';
            if (s === 'Alpha') return 'bg-red-100 text-red-700';
            return 'bg-amber-100 text-amber-700';
        }

        function showToast(msg, color) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.backgroundColor = color;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function updateSyncBadge() {
            const pendingCount = state.queue.filter(i => i.syncStatus === 'pending').length;
            const icon = document.getElementById('sync-icon');
            const text = document.getElementById('sync-text');
            
            if (!navigator.onLine) {
                icon.className = 'w-2 h-2 rounded-full bg-red-500';
                text.textContent = 'Offline';
            } else if (pendingCount > 0) {
                icon.className = 'w-2 h-2 rounded-full bg-amber-500 animate-pulse';
                text.textContent = `${pendingCount} Pending`;
            } else {
                icon.className = 'w-2 h-2 rounded-full bg-green-400';
                text.textContent = 'Tersinkron';
            }
        }

        async function handleLogin() {
            const ssId = document.getElementById('login-ssId').value;
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (!ssId) return showToast('Masukkan Sheet ID!', '#ef4444');
            state.ssId = ssId;
            localStorage.setItem('ssId', ssId);

            // Simulasi/Fetch login
            showToast('Menghubungkan...', '#0F766E');
            const res = await fetch(state.gasUrl, {
                method: 'POST',
                body: JSON.stringify({ action: 'login', data: { ssId, username: user, password: pass } })
            });
            const result = await res.json();

            if (result.success) {
                state.user = result.user;
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
                showToast(`Ahlan wa Sahlan, ${user}!`, '#0F766E');
                loadInitialData();
            } else {
                showToast(result.message, '#ef4444');
            }
        }

        async function runSetup() {
            if (!confirm('Jalankan setup database? Ini akan membuat tab baru di Google Sheets Anda.')) return;
            showToast('Memproses setup...', '#D97706');
            const res = await fetch(state.gasUrl, {
                method: 'POST',
                body: JSON.stringify({ action: 'setup_db', data: { ssId: state.ssId } })
            });
            const result = await res.json();
            showToast(result.message, result.success ? '#0F766E' : '#ef4444');
        }

        function switchTab(tab) {
            ['input', 'rekap', 'config'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        }
    </script>
</body>
</html>
