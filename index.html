<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi Digital PRO FINAL</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-slate-100">

<!-- LOGIN -->
<div id="auth" class="h-screen flex items-center justify-center">
    <form id="loginForm" class="bg-white p-8 rounded-xl w-80 space-y-4 shadow">
        <h1 class="font-bold text-xl text-center">LOGIN SYSTEM</h1>
        <input id="username" class="w-full p-3 border rounded" placeholder="Username">
        <input id="password" type="password" class="w-full p-3 border rounded" placeholder="Password">
        <button class="w-full bg-emerald-600 text-white p-3 rounded">MASUK</button>
    </form>
</div>

<!-- APP -->
<div id="app" class="hidden p-4 space-y-4">

    <!-- TOP -->
    <div class="flex justify-between items-center">
        <div>
            <h1 id="userName" class="font-bold"></h1>
            <span id="userRole" class="text-xs text-emerald-600"></span>
        </div>
        <button onclick="logout()" class="bg-red-500 text-white px-3 py-1 rounded">Logout</button>
    </div>

    <!-- NAV -->
    <div class="flex gap-2">
        <button onclick="nav('dashboard')" class="btn">Dashboard</button>
        <button onclick="nav('absen')" class="btn">Absensi</button>
        <button onclick="nav('siswa')" class="btn">Siswa</button>
        <button onclick="nav('rekap')" class="btn">Rekap</button>
    </div>

    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page">
        <div class="grid grid-cols-3 gap-4">
            <div class="card"><h2>Hadir</h2><p id="h"></p></div>
            <div class="card"><h2>I/S</h2><p id="i"></p></div>
            <div class="card"><h2>Alpha</h2><p id="a"></p></div>
        </div>
        <canvas id="chart"></canvas>
    </div>

    <!-- ABSENSI -->
    <div id="page-absen" class="page hidden space-y-2">

        <div class="flex gap-2">
            <input id="fSekolah" placeholder="Sekolah" class="inp">
            <input id="fKelas" placeholder="Kelas" class="inp">
        </div>

        <div class="flex gap-2">
            <label><input type="checkbox" value="1" checked>S1</label>
            <label><input type="checkbox" value="2">S2</label>
            <label><input type="checkbox" value="3">S3</label>
        </div>

        <button onclick="startScan()" class="btn bg-blue-600 text-white">SCAN</button>
        <div id="reader" class="hidden"></div>

        <table class="w-full bg-white">
            <tbody id="tAbsen"></tbody>
        </table>

        <button onclick="submitAbsen()" class="btn bg-emerald-700 text-white w-full">KIRIM</button>

    </div>

    <!-- SISWA -->
    <div id="page-siswa" class="page hidden">
        <button onclick="addSiswa()" class="btn bg-emerald-600 text-white">Tambah</button>
        <table class="w-full bg-white">
            <tbody id="tSiswa"></tbody>
        </table>
    </div>

    <!-- REKAP -->
    <div id="page-rekap" class="page hidden">
        <input type="month" id="bulan">
        <button onclick="loadRekap()" class="btn">Load</button>
        <div id="rekap"></div>
    </div>

</div>

<style>
.btn{padding:6px 12px;background:#eee;border-radius:6px}
.inp{padding:6px;border:1px solid #ccc;border-radius:6px}
.card{background:white;padding:10px;border-radius:10px;text-align:center}
</style>

<script>
const API="https://script.google.com/macros/s/AKfycbxOI8f4zuocy-d8DY7sZJrEB4qPjx5hP6upxUwJ3ud4G7hUcM8_J5pn6HNI1bxmZwfm/exec";

let DB={siswa:[],absen:[],users:[],session:null};
let TEMP={};
let scan;

/* API */
async function api(a,d={}) {
 const r=await fetch(API,{method:"POST",body:JSON.stringify({action:a,...d})});
 return await r.json();
}

/* LOGIN */
loginForm.onsubmit=async e=>{
 e.preventDefault();
 let r=await api("login",{username:username.value,password:password.value});
 if(r.status=="success"){
  DB.session=r.user;
  auth.classList.add("hidden");
  app.classList.remove("hidden");
  userName.innerText=r.user.username;
  userRole.innerText=r.user.role;
  init();
 }else alert("Login gagal");
};

/* INIT */
async function init(){
 DB.siswa=await api("getSiswa");
 DB.absen=await api("getAbsensi");
 renderDashboard();
}

/* NAV */
function nav(p){
 document.querySelectorAll(".page").forEach(x=>x.classList.add("hidden"));
 document.getElementById("page-"+p).classList.remove("hidden");

 if(p=="absen") renderAbsen();
 if(p=="siswa") renderSiswa();
 if(p=="dashboard") renderDashboard();
}

/* DASHBOARD */
function renderDashboard(){
 let h=DB.absen.filter(x=>x.status=="Hadir").length;
 let i=DB.absen.filter(x=>x.status!="Hadir" && x.status!="Alpha").length;
 let a=DB.absen.filter(x=>x.status=="Alpha").length;

 document.getElementById("h").innerText=h;
 document.getElementById("i").innerText=i;
 document.getElementById("a").innerText=a;

 new Chart(chart,{
  type:"doughnut",
  data:{labels:["H","I/S","A"],datasets:[{data:[h,i,a]}]}
 });
}

/* ABSEN */
function renderAbsen(){
 let s=fSekolah.value,k=fKelas.value;

 tAbsen.innerHTML=DB.siswa
 .filter(x=>(!s||x.sekolah==s)&&(!k||x.kelas==k))
 .map(x=>`
 <tr>
 <td>${x.nama}</td>
 <td>${TEMP[x.nis]||"-"}</td>
 <td>
 <button onclick="set('${x.nis}','Hadir')">H</button>
 <button onclick="set('${x.nis}','Izin')">I</button>
 <button onclick="set('${x.nis}','Sakit')">S</button>
 </td>
 </tr>`).join("");
}

function set(n,s){TEMP[n]=s;renderAbsen();}

/* SCAN */
function startScan(){
 reader.classList.remove("hidden");
 scan=new Html5Qrcode("reader");
 scan.start({facingMode:"environment"},{fps:10},txt=>{
  if(DB.siswa.find(x=>x.nis==txt)){
    TEMP[txt]="Hadir";
    renderAbsen();
  }
 });
}

/* SUBMIT */
async function submitAbsen(){
 let sesi=[...document.querySelectorAll("input[type=checkbox]:checked")].map(x=>x.value);

 let data=DB.siswa.map(s=>({
  nis:s.nis,
  status:TEMP[s.nis]||"Alpha",
  sesi,
  tanggal:new Date().toISOString().split("T")[0]
 }));

 await api("saveAbsensi",{data});
 TEMP={};
 alert("Tersimpan");
}

/* SISWA */
function renderSiswa(){
 tSiswa.innerHTML=DB.siswa.map(x=>`
 <tr>
 <td>${x.nama}</td>
 <td>${x.kelas}</td>
 <td><button onclick="del('${x.nis}')">X</button></td>
 </tr>`).join("");
}

async function del(n){
 await api("deleteSiswa",{nis:n});
 init();
}

/* REKAP */
function loadRekap(){
 let b=bulan.value;
 rekap.innerHTML=JSON.stringify(DB.absen.filter(x=>x.tanggal.startsWith(b)));
}

/* LOGOUT */
function logout(){location.reload();}

fSekolah.oninput=renderAbsen;
fKelas.oninput=renderAbsen;

</script>
</body>
</html>
